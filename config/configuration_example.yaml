# Config for report generator
#
# --- File naming ---
#   The file name must match the DeviceConfiguration field from the measurement JSON.
#   Example: SDX-43U4169.yaml
#   Factory suffix is allowed: SDX-43U4169_CH19.yaml
#     (CH = Changhong factory, 19 = order number)
#
# --- Value fields ---
#   Each metric supports min, typ, max fields.
#   Leave a field as None if there is no requirement for it.
#
# --- Dynamic visibility ---
#   Color Gamut metrics (Cg_*) and Delta_e are HIDDEN in the Main Test Results
#   comparison table unless at least one of min/typ/max has a real value (not None).
#   Device Reports always show the full measured data regardless of this setting.
#
#   To SHOW a metric in Main Test Results  → set at least one of min/typ/max to a number.
#   To HIDE a metric in Main Test Results  → set all of min/typ/max to None.
#
# --- Color coordinates ---
#   Specify only typ per coordinate and set Coordinates_tolerance.
#   min/max are computed automatically as typ ± Coordinates_tolerance.

Brightness: # Brightness range
  min: 260
  typ: 280
  max: None
Brightness_uniformity: # Brightness uniformity range
  min: 65
  typ: 68
  max: None
Contrast: # Contrast ratio range
  min: 3000
  typ: 4000
  max: None

# --- Color gamut: sRGB ---
Cg_rgb_area: # sRGB gamut coverage, area ratio method
  min: 67
  typ: 72
  max: None
Cg_rgb: # sRGB gamut coverage, intersection method
  min: 67
  typ: 72
  max: None
Cg_rgb_uv_area: # sRGB gamut coverage, CIE 1976 u'v', area ratio method
  min: None
  typ: None
  max: None
Cg_rgb_uv: # sRGB gamut coverage, CIE 1976 u'v', intersection method
  min: None
  typ: None
  max: None

# --- Color gamut: NTSC ---
Cg_ntsc_area: # NTSC gamut coverage, area ratio method
  min: 67
  typ: 72
  max: None
Cg_ntsc: # NTSC gamut coverage, intersection method
  min: 67
  typ: 72
  max: None
Cg_ntsc_uv_area: # NTSC gamut coverage, CIE 1976 u'v', area ratio method
  min: None
  typ: None
  max: None
Cg_ntsc_uv: # NTSC gamut coverage, CIE 1976 u'v', intersection method
  min: None
  typ: None
  max: None

# --- Color gamut: DCI-P3 ---
Cg_dcip3_area: # DCI-P3 gamut coverage, area ratio method
  min: None
  typ: None
  max: None
Cg_dcip3: # DCI-P3 gamut coverage, intersection method
  min: None
  typ: None
  max: None
Cg_dcip3_uv_area: # DCI-P3 gamut coverage, CIE 1976 u'v', area ratio method
  min: 90
  typ: 95
  max: None
Cg_dcip3_uv: # DCI-P3 gamut coverage, CIE 1976 u'v', intersection method
  min: 90
  typ: 95
  max: None

Temperature: # Color temperature range
  min: 8835
  typ: 9585
  max: 10335
Delta_e: # Requirements for color accuracy
  min: None
  typ: None
  max: None

# --- Color coordinates ---
# min/max are computed automatically as typ ± Coordinates_tolerance
Coordinates_tolerance: 0.030
Red_x: # Requirements for color coordinates of Red
  typ: 0.638
Red_y:
  typ: 0.335
Green_x: # Requirements for color coordinates of Green
  typ: 0.307
Green_y:
  typ: 0.597
Blue_x: # Requirements for color coordinates of Blue
  typ: 0.150
Blue_y:
  typ: 0.062
White_x: # Requirements for color coordinates of White
  typ: 0.283
White_y:
  typ: 0.290
