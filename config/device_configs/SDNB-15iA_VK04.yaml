# Config for report generator
# General instructions:
#   The file name must match the approved model name, for example SDX-43U4169.yaml
#   In cases where the order number and name of the manufacturing factory must be included in the file name, variants such as SDX-43U4169_CH19 are permitted
#     Where SDX-65U4169 is the model name, CH is the Changhong factory, and 19 is the order number.
# Note:
#   If no requirements to max value, just leave it as None
#   If no requirements to color gamut for one of color space, put the same value as for necessary color space
#   if no requirements you can leave by default values for color accuracy

Brightness: # Brightness range
  min: 290
  typ: 300
  max: None
Brightness_uniformity: # Brightness uniformity range
  min: 75
  typ: 80
  max: None
Contrast: # Contrast ratio range
  min: 1000
  typ: 1500
  max: None

# --- Color gamut: sRGB ---
Cg_rgb_area: # sRGB gamut coverage, area ratio method
  min: None
  typ: None
  max: None
Cg_rgb: # sRGB gamut coverage, intersection method
  min: 95
  typ: 99
  max: None
Cg_rgb_uv_area: # sRGB gamut coverage, CIE 1976 u'v', area ratio method
  min: None
  typ: None
  max: None
Cg_rgb_uv: # sRGB gamut coverage, CIE 1976 u'v', intersection method
  min: None
  typ: None
  max: None

# --- Color gamut: NTSC ---
Cg_ntsc_area: # NTSC gamut coverage, area ratio method
  min: None
  typ: None
  max: None
Cg_ntsc: # NTSC gamut coverage, intersection method
  min: None
  typ: None
  max: None
Cg_ntsc_uv_area: # NTSC gamut coverage, CIE 1976 u'v', area ratio method
  min: None
  typ: None
  max: None
Cg_ntsc_uv: # NTSC gamut coverage, CIE 1976 u'v', intersection method
  min: None
  typ: None
  max: None

# --- Color gamut: DCI-P3 ---
Cg_dcip3_area: # DCI-P3 gamut coverage, area ratio method
  min: None
  typ: None
  max: None
Cg_dcip3: # DCI-P3 gamut coverage, intersection method
  min: None
  typ: None
  max: None
Cg_dcip3_uv_area: # DCI-P3 gamut coverage, CIE 1976 u'v', area ratio method
  min: None
  typ: None
  max: None
Cg_dcip3_uv: # DCI-P3 gamut coverage, CIE 1976 u'v', intersection method
  min: None
  typ: None
  max: None

Temperature: # Color temperature range
  min: 5800
  typ: 6300
  max: 7700
Delta_e: # Requirements for color accuracy
  min: None
  typ: None
  max: None

# --- Color coordinates ---
# min/max are computed automatically as typ ± Coordinates_tolerance
Coordinates_tolerance: 0.030
Red_x: # Requirements for color coordinates of Red
  typ: 0.644
Red_y:
  typ: 0.333
Green_x: # Requirements for color coordinates of Green
  typ: 0.296
Green_y:
  typ: 0.661
Blue_x: # Requirements for color coordinates of Blue
  typ: 0.136
Blue_y:
  typ: 0.046
White_x: # Requirements for color coordinates of White
  typ: 0.313
White_y:
  typ: 0.329
